name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/30 * * * *"
    - cron: "17 20,8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate weather cache
        run: npm run update:weather-cache
        env:
          WEATHER_CACHE_REFRESH_SCOPE: ${{ github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *' && 'alerts' || 'full' }}
          WEATHER_CACHE_EXISTING_URL: https://roka-the-32-division-ai-tf.github.io/Maritime-Intrusion-Assessment-Dashboard/data/weather-cache.json
          WEATHER_CACHE_SOURCE_URL: ${{ secrets.WEATHER_CACHE_SOURCE_URL }}
          WEATHER_CACHE_SOURCE_TOKEN: ${{ secrets.WEATHER_CACHE_SOURCE_TOKEN }}
          PUBLIC_DATA_SERVICE_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
          KMA_APIHUB_AUTH_KEY: ${{ secrets.KMA_APIHUB_AUTH_KEY }}
          KMA_SERVICE_KEY: ${{ secrets.KMA_SERVICE_KEY }}
          KMA_WARNING_SERVICE_KEY: ${{ secrets.KMA_WARNING_SERVICE_KEY }}
          KHOA_SERVICE_KEY: ${{ secrets.KHOA_SERVICE_KEY }}
          KASI_SERVICE_KEY: ${{ secrets.KASI_SERVICE_KEY }}
          AIRKOREA_SERVICE_KEY: ${{ secrets.AIRKOREA_SERVICE_KEY }}
          FOREST_SERVICE_KEY: ${{ secrets.FOREST_SERVICE_KEY }}
          KHOA_TIDE_OBS_CODE_SEOSAN: ${{ secrets.KHOA_TIDE_OBS_CODE_SEOSAN }}
          KHOA_TIDE_OBS_CODE_DANGJIN: ${{ secrets.KHOA_TIDE_OBS_CODE_DANGJIN }}
          KHOA_TIDE_OBS_CODE_TAEAN: ${{ secrets.KHOA_TIDE_OBS_CODE_TAEAN }}
          KHOA_TIDE_OBS_CODE_BORYEONG: ${{ secrets.KHOA_TIDE_OBS_CODE_BORYEONG }}

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /Maritime-Intrusion-Assessment-Dashboard

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
